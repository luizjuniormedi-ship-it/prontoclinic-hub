name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: |
          set -Eeuo pipefail
          export PGPASSWORD=postgres
          export DATABASE_URL=postgresql://postgres:postgres@localhost:54322/postgres

          until pg_isready -h localhost -p 54322 -U postgres -d postgres; do
            sleep 1
          done

          # The migrations target Supabase roles and auth helpers. Create
          # only the disposable compatibility objects needed by this bare
          # PostgreSQL service; no application data is seeded.
          psql -v ON_ERROR_STOP=1 -1 -h localhost -p 54322 -U postgres -d postgres <<'SQL'
          DO $
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'anon') THEN CREATE ROLE anon NOLOGIN; END IF;
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'authenticated') THEN CREATE ROLE authenticated NOLOGIN; END IF;
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'service_role') THEN CREATE ROLE service_role NOLOGIN BYPASSRLS; END IF;
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'supabase_auth_admin') THEN CREATE ROLE supabase_auth_admin NOLOGIN BYPASSRLS; END IF;
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'supabase_admin') THEN CREATE ROLE supabase_admin NOLOGIN BYPASSRLS; END IF;
          END $;
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (
            id UUID PRIMARY KEY,
            email TEXT,
            raw_user_meta_data JSONB,
            raw_app_meta_data JSONB,
            created_at TIMESTAMPTZ DEFAULT NOW()
          );
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS UUID
          LANGUAGE SQL STABLE AS $fn$
            SELECT NULLIF(current_setting('request.jwt.claim.sub', true), '')::UUID
          $fn$;
          CREATE OR REPLACE FUNCTION auth.role() RETURNS TEXT
          LANGUAGE SQL STABLE AS $fn$
            SELECT COALESCE(NULLIF(current_setting('request.jwt.claim.role', true), ''), 'service_role')
          $fn$;
          CREATE OR REPLACE FUNCTION auth.jwt() RETURNS JSONB
          LANGUAGE SQL STABLE AS $fn$
            SELECT COALESCE(NULLIF(current_setting('request.jwt.claims', true), '')::JSONB, '{}'::JSONB)
          $fn$;
          SQL

          # 20251231* are legacy patch scripts that assume the application
          # schema already exists. Fresh CI replays the canonical baseline
          # followed by subsequent migrations only.
          mapfile -t migrations < <(
            find supabase/migrations -maxdepth 1 -type f -name '*.sql'               ! -name '202512*.sql'               -print | sort
          )
          test "${#migrations[@]}" -gt 0

          for f in "${migrations[@]}"; do
            echo "Applying $f..."
            psql -v ON_ERROR_STOP=1 -1 -h localhost -p 54322 -U postgres -d postgres -f "$f"
          done
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 30

      - name: Install Playwright
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          E2E_BASE_URL: http://localhost:4173

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit
          path: test-results/junit.xml
          retention-days: 30

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/results.json
          retention-days: 30

      - name: Fail if critical a11y violations
        if: always()
        run: |
          if [ -f test-results/results.json ]; then
            test -f scripts/check-a11y-violations.mjs
            node scripts/check-a11y-violations.mjs
          fi
