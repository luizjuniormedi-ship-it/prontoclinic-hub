name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: |
          DATABASE_URL=postgresql://postgres:postgres@localhost:54322/postgres
          export PGPASSWORD=postgres
          for f in supabase/migrations/*.sql; do
            echo "Applying $f..."
            psql -h localhost -U postgres -d postgres -f "$f" || echo "Migration $f failed - continuing"
          done
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres

      - name: Reset Supabase staging database (legacy)
        run: |
          echo "Resetando banco de staging (idempotente)..."
          curl -X POST \
            "${VITE_SUPABASE_URL}/rest/v1/rpc/reset_e2e_data" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' || echo "RPC reset_e2e_data indisponível — seguindo"
        continue-on-error: true

      - name: Type check
        run: npm run type-check || npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 30

      - name: Install Playwright
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          E2E_BASE_URL: http://localhost:4173

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit
          path: test-results/junit.xml
          retention-days: 30

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/results.json
          retention-days: 30

      - name: Fail if critical a11y violations
        if: always()
        run: |
          if [ -f test-results/results.json ]; then
            node scripts/check-a11y-violations.mjs || echo "Script opcional não implementado"
          fi
        continue-on-error: true