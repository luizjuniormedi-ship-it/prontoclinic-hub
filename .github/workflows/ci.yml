name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VITE_SUPABASE_URL: http://127.0.0.1:8000
      VITE_SUPABASE_ANON_KEY: local-ci-anon-key
      E2E_ENV: local
      E2E_MODE: readonly
      E2E_AUTH_MODE: custom
      E2E_AUTH_READY: 'true'
      E2E_ADMIN_EMAIL: admin.ci@example.invalid
      E2E_ADMIN_PASSWORD: E2E-Local-Password-123!
      E2E_DOCTOR_EMAIL: doctor.ci@example.invalid
      E2E_DOCTOR_PASSWORD: E2E-Local-Password-123!
      E2E_RECEPTION_EMAIL: reception.ci@example.invalid
      E2E_RECEPTION_PASSWORD: E2E-Local-Password-123!

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: |
          set -euo pipefail
          DATABASE_URL=postgresql://postgres:postgres@localhost:54322/postgres
          export PGPASSWORD=postgres
          for f in supabase/migrations/*.sql; do
            echo "Applying $f..."
            psql -v ON_ERROR_STOP=1 -h localhost -p 54322 -U postgres -d postgres -f "$f"
          done
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres

      - name: Verify billing appointment replay contract
        run: |
          set -euo pipefail
          export PGPASSWORD=postgres
          psql -v ON_ERROR_STOP=1 -h localhost -p 54322 -U postgres -d postgres \
            -f supabase/tests/billing_appointment_replay_contract.sql
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres

      - name: Verify TISS appointment link contract
        run: |
          set -euo pipefail
          export PGPASSWORD=postgres
          psql -v ON_ERROR_STOP=1 -h localhost -p 54322 -U postgres -d postgres \
            -f supabase/tests/tiss_appointment_link_contract.sql
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres

      - name: Replay legacy billings repair gate
        run: |
          set -euo pipefail
          export PGPASSWORD=postgres
          dropdb --if-exists -h localhost -U postgres -p 54322 billing_replay
          createdb -h localhost -U postgres -p 54322 billing_replay
          psql -v ON_ERROR_STOP=1 -h localhost -U postgres -p 54322 -d billing_replay <<'SQL'
          CREATE TABLE public.appointments (id BIGINT PRIMARY KEY);
          CREATE TABLE public.billings (
            id BIGSERIAL PRIMARY KEY,
            amount NUMERIC(12,2),
            status VARCHAR(20)
          );
          INSERT INTO public.billings (amount, status) VALUES (150.00, 'em_aberto');
          SQL
          psql -v ON_ERROR_STOP=1 -h localhost -U postgres -p 54322 -d billing_replay \
            -f supabase/migrations/20260711120000_billing_appointment_id_repair.sql
          psql -v ON_ERROR_STOP=1 -h localhost -U postgres -p 54322 -d billing_replay \
            -f supabase/tests/billing_appointment_replay_contract.sql
          test "$(psql -At -h localhost -U postgres -p 54322 -d billing_replay \
            -c 'SELECT count(*) FROM public.billings WHERE amount = 150.00 AND status = '\''em_aberto'\'';')" = "1"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/billing_replay

      - name: Seed synthetic local E2E users
        run: |
          set -euo pipefail
          export PGPASSWORD=postgres
          psql -v ON_ERROR_STOP=1 -h localhost -p 54322 -U postgres -d postgres \
            -f scripts/e2e/seed-local-users.sql

      - name: Start local auth harness
        run: |
          set -euo pipefail
          export LOCAL_AUTH_HOST=127.0.0.1
          export LOCAL_AUTH_PORT=8000
          export PGHOST=localhost
          export PGPORT=54322
          export PGUSER=postgres
          export PGDATABASE=postgres
          export PGPASSWORD=postgres
          export JWT_SECRET='local-ci-jwt-secret-change-me-0123456789'
          nohup node local-auth-server.mjs > /tmp/prontomedic-auth.log 2>&1 &
          echo $! > /tmp/prontomedic-auth.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/prontomedic-auth.log
          exit 1

      - name: Type check
        run: npm run type-check || npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 30

      - name: Install Playwright
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          E2E_BASE_URL: http://localhost:4173

      - name: Stop local auth harness
        if: always()
        run: |
          if [ -f /tmp/prontomedic-auth.pid ]; then
            kill "$(cat /tmp/prontomedic-auth.pid)" || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit
          path: test-results/junit.xml
          retention-days: 30

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/results.json
          retention-days: 30

      - name: Fail if critical a11y violations
        if: always()
        run: |
          if [ -f test-results/results.json ]; then
            node scripts/check-a11y-violations.mjs || echo "Script opcional não implementado"
          fi
        continue-on-error: true
