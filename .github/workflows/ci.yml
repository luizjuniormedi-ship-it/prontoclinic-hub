name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VITE_SUPABASE_URL: http://127.0.0.1:8000
      VITE_SUPABASE_ANON_KEY: local-ci-anon-key
      E2E_ENV: local
      E2E_MODE: readonly
      E2E_AUTH_MODE: custom
      E2E_AUTH_READY: 'true'

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: |
          export PGPASSWORD=postgres

          # Supabase supplies these roles; a clean PostgreSQL service does not.
          # Create only missing compatibility roles before policy migrations.
          for role in anon authenticated service_role; do
            if ! psql "$DATABASE_URL" -tAc "SELECT 1 FROM pg_roles WHERE rolname = '$role'" | grep -q 1; then
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "CREATE ROLE $role NOLOGIN"
            fi
          done

          for f in supabase/migrations/*.sql; do
            echo "Applying $f..."
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -1 -f "$f"
          done
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres

      - name: Type check
        run: npm run type-check

      - name: Validate auth replay compatibility
        run: |
          export PGPASSWORD=postgres
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -v e2e_password="$E2E_SEED_PASSWORD" \
            -f scripts/seed-e2e-users.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
            "SELECT column_name FROM information_schema.columns WHERE table_schema = 'auth' AND table_name = 'users' AND column_name IN ('encrypted_password','email_confirmed_at','raw_app_meta_data','raw_user_meta_data') ORDER BY column_name;"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres
          E2E_SEED_PASSWORD: ci-only-seed-password


      - name: Start local auth harness
        run: |
          set -euo pipefail
          export LOCAL_AUTH_HOST=127.0.0.1
          export LOCAL_AUTH_PORT=8000
          export PGHOST=localhost
          export PGPORT=54322
          export PGUSER=postgres
          export PGDATABASE=postgres
          export PGPASSWORD=postgres
          export JWT_SECRET='local-ci-jwt-secret-change-me-0123456789'
          nohup node local-auth-server.mjs > /tmp/prontomedic-auth.log 2>&1 &
          echo $! > /tmp/prontomedic-auth.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/prontomedic-auth.log
          exit 1

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 30

      - name: Install Playwright
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          E2E_BASE_URL: http://localhost:4173


      - name: Stop local auth harness
        if: always()
        run: |
          if [ -f /tmp/prontomedic-auth.pid ]; then
            kill "$(cat /tmp/prontomedic-auth.pid)" || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit
          path: test-results/junit.xml
          retention-days: 30

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/results.json
          retention-days: 30

      - name: Fail if critical a11y violations
        if: always()
        run: |
          if [ -f test-results/results.json ]; then
            test -f scripts/check-a11y-violations.mjs
            node scripts/check-a11y-violations.mjs
          fi
