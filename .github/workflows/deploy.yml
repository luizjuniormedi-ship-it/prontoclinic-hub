name: Deploy ProntoClinic Hub

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'vite.config.ts'
      - 'src/**'
      - 'public/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_NAME: ProntoClinic Hub
          VITE_APP_ENV: production
          VITE_ENABLE_TELEMEDICINE: 'false'
          VITE_ENABLE_WHATSAPP: 'false'
          VITE_TISS_AMBIENTE: HOMOLOGACAO
          VITE_TISS_VERSION: '3.05.00'
          VITE_DICOM_BUCKET: dicom
        run: |
          cp .env.example .env.production
          # Permitir build sem secrets (usa defaults do .env.example)
          npm run build

      - name: Create SPA fallback (React Router)
        run: cp dist/index.html dist/200.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4