name: F1 Runtime Gate
# Runtime replay gate is intentionally push/manual only; never targets VPS or DataSIGH.

on:
  workflow_dispatch:
  push:
    branches:
      - ci/f1-runtime-gate-20260712
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  f1-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      # The authenticated HTTP exercise runs in CI, where npm dependencies,
      # ephemeral auth users, and local-auth are already prepared. This job
      # remains the PostgreSQL 18 SQL replay gate to avoid duplicating that stack.
      - name: Validate P0 medical record HTTP smoke artifact
        run: node --check scripts/smoke-medical-record-http.mjs

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Replay F1 baseline and contracts
        env:
          PGPASSWORD: postgres
          PGHOST: 127.0.0.1
          PGPORT: 54322
          PGUSER: postgres
          PGDATABASE: postgres
        run: |
          set -Eeuo pipefail
          mkdir -p artifacts/f1
          exec > >(tee artifacts/f1/runtime-gate.log) 2>&1
          psql -v ON_ERROR_STOP=1 <<'SQL'
          DO $f1$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN CREATE ROLE anon NOLOGIN; END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN CREATE ROLE authenticated NOLOGIN; END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN CREATE ROLE service_role NOLOGIN; END IF;
          END
          $f1$;
          ALTER ROLE anon NOBYPASSRLS;
          ALTER ROLE authenticated NOBYPASSRLS;
          ALTER ROLE service_role BYPASSRLS;
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (id uuid PRIMARY KEY);
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS $f1$
            SELECT NULLIF(current_setting('request.jwt.claim.sub', TRUE), '')::uuid
          $f1$;
          SQL
          for migration in \
            supabase/migrations/00000_extensions.sql \
            supabase/migrations/20260101000000_base_tables.sql \
            supabase/migrations/20251231018000_helper_functions.sql \
            supabase/migrations/20260101000001_payment_sources.sql \
            supabase/migrations/20260101000002_insurance_companies.sql \
            supabase/migrations/20260101000003_insurance_plans.sql \
            supabase/migrations/20260101000004_professional_insurances.sql \
            supabase/migrations/20251231003000_create_medical_records_stub.sql \
            supabase/migrations/20251231005000_create_billings_stub.sql \
            supabase/migrations/20260101000007_audit_logs.sql \
            supabase/migrations/20260101001200_security_hardening.sql \
            supabase/migrations/20260708090000_scheduling_phase1.sql \
            supabase/release-mvp/018_professional_schedules_canonical.sql \
            supabase/migrations/20260708093000_call_center_phase1.sql \
            supabase/migrations/20260709210000_scheduling_operations.sql
          do
            echo "Applying core: $migration"
            psql -v ON_ERROR_STOP=1 -1 -f "$migration"
          done
          echo "Applying baseline: supabase/release-mvp/008_canonical_insurance.sql"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/release-mvp/008_canonical_insurance.sql
          psql -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE app_owner NOLOGIN NOSUPERUSER NOBYPASSRLS;
          CREATE ROLE app_prontomedic NOLOGIN NOSUPERUSER NOBYPASSRLS;
          ALTER TABLE public.medical_records OWNER TO app_owner;
          ALTER TABLE public.billings OWNER TO app_owner;
          ALTER TABLE public.tiss_xml OWNER TO app_owner;
          ALTER TABLE public.insurance_authorizations OWNER TO app_owner;
          ALTER TABLE public.insurance_eligibility_checks OWNER TO app_owner;
          ALTER TABLE public.audit_logs OWNER TO app_owner;
          SQL
          for artifact in \
            supabase/release-mvp/000_p0_p1_consolidated.sql \
            supabase/migrations/20260709223000_scheduling_requirements.sql \
            supabase/migrations/20260709232000_scheduling_confirmations.sql \
            supabase/migrations/20260709235000_reception_checkin_core.sql \
            supabase/migrations/20260710001000_reception_authorization_center.sql \
            supabase/migrations/20260712100000_authorization_audit_timestamps.sql \
            supabase/migrations/20260712110000_secure_appointment_metadata_update.sql \
            supabase/migrations/20260712120000_secure_patient_update.sql \
            supabase/migrations/20260712170000_medical_record_prescription_contract.sql \
            supabase/migrations/20260712180000_medical_records_canonical_columns.sql \
            supabase/migrations/20260712130000_secure_medical_records.sql \
            supabase/migrations/20260712140000_secure_call_center_mutations.sql \
            supabase/migrations/20260712150000_call_center_rls_hardening.sql \
            supabase/migrations/20260712160000_call_center_identity_integrity.sql \
            supabase/migrations/20260712190000_rbac_schema_baseline.sql \
            supabase/migrations/20260712200000_secure_user_profile_admin.sql \
            supabase/migrations/20260712210000_secure_billings.sql \
            supabase/migrations/20260712220000_secure_billing_receipts.sql \
            supabase/migrations/20260712225000_secure_tiss_foundation.sql \
            supabase/migrations/20260712230000_financial_summary_rpc.sql \
            supabase/migrations/20260712231000_billing_production_read_model.sql \
            supabase/migrations/20260712232000_operational_schema_contracts.sql \
            supabase/release-mvp/011_insurance_authoritative_ledgers.sql \
            supabase/release-mvp/016_service_only_password_resets.sql \
            supabase/release-mvp/017_clinical_safe_functions.sql
          do
            echo "Applying baseline: $artifact"
            psql -v ON_ERROR_STOP=1 -1 -f "$artifact"
          done
          psql -v ON_ERROR_STOP=1 <<'SQL'
          ALTER TABLE public.user_profiles OWNER TO app_owner;
          ALTER TABLE public.patients OWNER TO app_owner;
          ALTER TABLE public.professionals OWNER TO app_owner;
          ALTER TABLE public.appointments OWNER TO app_owner;
          ALTER TABLE public.medical_records OWNER TO app_owner;
          ALTER TABLE public.billings OWNER TO app_owner;
          ALTER TABLE public.insurance_authorizations OWNER TO app_owner;
          ALTER TABLE public.insurance_eligibility_checks OWNER TO app_owner;
          ALTER TABLE public.audit_logs OWNER TO app_owner;
          ALTER TABLE public.scheduling_contact_logs OWNER TO app_owner;
          ALTER TABLE public.scheduling_call_center_tasks OWNER TO app_owner;
          ALTER TABLE public.roles OWNER TO app_owner;
          ALTER TABLE public.role_permissions OWNER TO app_owner;
          ALTER TABLE public.tiss_xml OWNER TO app_owner;
          SQL
          echo "Running clinical safe function contract"
          psql -v ON_ERROR_STOP=1 <<'SQL'
          DO $f1$
          DECLARE v_imc NUMERIC; v_classification TEXT;
          BEGIN
            SELECT imc, classificacao INTO v_imc, v_classification
              FROM public.calc_imc(70, 175);
            IF v_imc <> 22.86 OR v_classification <> 'eutrofia' THEN
              RAISE EXCEPTION 'calc_imc contract mismatch: %, %', v_imc, v_classification;
            END IF;
          END
          $f1$;
          SQL
          echo "Running empty-db contract"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/mvp_baseline_empty_db_gate.sql
          echo "Running F1 runtime security gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_security_gate.sql
          echo "Running F1 runtime tenant behavior gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_tenant_behavior_gate.sql
          echo "Running F1 runtime operational behavior gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_operational_behavior_gate.sql
          echo "Running F1 runtime RBAC behavior gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_rbac_behavior_gate.sql
          echo "Running F1 runtime billing behavior gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_billing_behavior_gate.sql
          echo "Running F1 runtime schema contract gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_schema_contract_gate.sql
          echo "Running F1 runtime receipt ledger gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_receipts_behavior_gate.sql
          echo "Running F1 runtime TISS foundation gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_tiss_foundation_gate.sql
          echo "Applying tenant surface hardening"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/migrations/20260712233000_tenant_surface_hardening.sql
          echo "Running F1 runtime tenant surface gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_tenant_surface_gate.sql
          echo "Applying reception RBAC defaults"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/migrations/20260712234000_reception_rbac_read_defaults.sql
          echo "Running F1 runtime reception RBAC defaults gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_reception_rbac_defaults_gate.sql
          echo "Applying scheduling/reception tenant hardening"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/migrations/20260712234500_scheduling_reception_tenant_hardening.sql
          echo "Running F1 runtime scheduling/reception tenant gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_scheduling_reception_tenant_gate.sql
          echo "Applying TISS read-only model"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/migrations/20260712235000_tiss_read_model.sql
          echo "Running F1 runtime TISS read-model gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_tiss_read_model_gate.sql
          echo "Applying TISS glosa/protocol read models"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/migrations/20260712236000_tiss_glosa_protocol_read_models.sql
          echo "Running F1 runtime TISS glosa/protocol read gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_tiss_glosa_protocol_read_gate.sql
          echo "Applying clinical signing contract"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/migrations/20260713081337_clinical_record_signing_contract.sql
          echo "Running F1 runtime clinical signing gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_clinical_signing_gate.sql
          echo "Applying encounters read model"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/migrations/20260713140000_encounters_read_model.sql
          echo "Running F1 runtime encounters read-model gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_encounters_read_model_gate.sql
          echo "Hardening clinical data-access audit RPC"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/migrations/20260713150000_harden_log_data_access.sql
          echo "Running F1 runtime clinical data-access audit gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_audit_data_access_gate.sql
          echo "Applying notification and pre-registration tenant hardening"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/migrations/20260713090310_notification_pre_registration_tenant_hardening.sql
          echo "Running notification and pre-registration tenant gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_notification_pre_registration_gate.sql
          echo "Applying LIS foundation and result hardening"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/migrations/20260101000018_lis.sql
          psql -v ON_ERROR_STOP=1 -1 -f supabase/migrations/20260713100000_lis_atomic_result_release_contract.sql
          echo "Running LIS result tenant gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_lis_atomic_result_gate.sql
          echo "Applying nursing canonical secure contract"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/migrations/20260713120000_nursing_canonical_secure_contract.sql
          echo "Running nursing tenant and clinical safety gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_nursing_secure_gate.sql
          echo "Applying nursing triage atomic contract"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/migrations/20260713130000_nursing_triage_atomic_contract.sql
          echo "Running nursing triage atomic gate"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/tests/f1_runtime_nursing_triage_gate.sql
          echo "Running nursing triage real concurrency gate"
          bash scripts/ci-nursing-triage-concurrency.sh
          echo "Applying F4 pharmacy foundation and atomic tenant contract"
          psql -v ON_ERROR_STOP=1 -1 -f supabase/migrations/20260101000015_farmacia.sql
          psql -v ON_ERROR_STOP=1 -1 -f supabase/migrations/20260713141921_f4_pharmacy_atomic_tenant_contract.sql
          echo "Running F4 pharmacy ACL, tenant, rollback, idempotency and concurrency gate"
          psql -v ON_ERROR_STOP=1 \
            -v "f4_dblink_connstr=host=$PGHOST port=$PGPORT dbname=$PGDATABASE user=$PGUSER password=$PGPASSWORD" \
            -f supabase/tests/f4_pharmacy_atomic_tenant_gate.sql

      - name: Upload F1 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: f1-runtime-evidence
          path: artifacts/f1
          if-no-files-found: warn

