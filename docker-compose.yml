version: '3.8'

# Docker Compose para Supabase local + Postgres
# Para Supabase completo (Auth, Storage, Realtime, Edge Functions), use:
#   npx supabase init
#   npx supabase start
#
# Este docker-compose oferece apenas o PostgreSQL 16 para testes de migrations
# sem precisar de Supabase Cloud.

services:
  postgres:
    image: postgres:16-alpine
    container_name: prontoclinic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
    ports:
      - "54322:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # As migrations NÃO são aplicadas automaticamente aqui porque o volume initdb.d
      # só roda no primeiro start. Use: docker exec -i ... psql ... < migration.sql
      # Ou descomente a linha abaixo para auto-aplicar (apenas primeiro start):
      # - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prontoclinic-net

  # Opcional: pgAdmin para inspeção visual
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: prontoclinic-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@prontoclinic.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "54323:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prontoclinic-net
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local

networks:
  prontoclinic-net:
    driver: bridge

# Como usar:
# 1. Subir apenas Postgres:
#    docker compose up -d postgres
#
# 2. Subir Postgres + pgAdmin:
#    docker compose --profile tools up -d
#
# 3. Aplicar migrations:
#    for f in supabase/migrations/*.sql; do
#      docker exec -i prontoclinic-postgres psql -U postgres < "$f"
#    done
#
# 4. Conectar psql externo:
#    psql postgresql://postgres:postgres@localhost:54322/postgres
#
# 5. Parar tudo:
#    docker compose down -v  # -v remove volumes (APAGA DADOS)
